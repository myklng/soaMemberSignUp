name: Bust WordPress form cache

on:
  push:
    branches: [main]
    paths:
      - soa-signup-form.html

jobs:
  bust-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Delete WordPress transient
        run: |
          STATUS=$(curl -s -o /tmp/bust_response.json -w "%{http_code}" \
            -X POST \
            -H "X-SOA-Secret: ${{ secrets.SOA_CACHE_BUST_SECRET }}" \
            "${{ secrets.WP_SITE_URL }}/wp-json/soa/v1/bust-cache")
          echo "HTTP $STATUS — $(cat /tmp/bust_response.json)"
          [ "$STATUS" = "200" ] || exit 1
